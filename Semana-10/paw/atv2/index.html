<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Guitar Hero Controller</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.4/css/bulma.min.css">
</head>

<body>
    <section class="section">
        <div class="container is-flex is-justify-content-center">
            <div id="card" class="columns">

                <div id="image" class="column is-narrow">
                    <figure class="image" style="height: 100%;">
                        <img src="image.jpg" alt="Guitar Hero Controller"
                            style="width: 300px; height: 100%; object-fit: cover;">
                    </figure>
                </div>

                <div id="content" class="column">
                    <h1 class="title is-3">Guitar Hero Controller</h1>
                    <p class="subtitle is-3">Você vai finalmente se sentir como um verdadeiro rockstar!</p>
                    <p class="subtitle is-4">R$ <span id="price">299,99</span></p>
                    
                    <br>

                    <div class="buttons">
                        <button class="button is-primary">Comprar</button>
                        <button class="button is-link">Adicionar ao carrinho</button>
                    </div>
                </div>

            </div>
        </div>
    </section>
</body>

</html>
