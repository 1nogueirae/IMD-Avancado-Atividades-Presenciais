<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Compras</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/css/materialize.min.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1 class="strong">Registrar nova compra</h1>
        <div class="row">
            <div class="col s6">
                <h3 class="strong">Lista de Produtos</h3>
                <ul class="collection" id="productsList">
                </ul>
            </div>
            <div class="col s6">
                <h3 class="strong">Itens adicionados</h3>
                <ul id="itemsAddedList" class="collection">
                </ul>
            </div>
            <div class="col s12 right-align">
                <a class="waves-effect waves-light btn">
                    Continuar Compra
                    <i class="material-icons right">send</i>
                </a>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/1.0.0/js/materialize.min.js"></script>
    <script>
        const productsList = [
            {
                name: 'Ração para gatos',
                quantity: 35
            },
            {
                name: 'Ração para cães',
                quantity: 12
            },
            {
                name: 'Ração para ornitorrincos',
                quantity: 20
            },
            {
                name: 'Mordedor',
                quantity: 20
            },
            {
                name: 'Coleira',
                quantity: 20
            }
        ];
        const itemsAdded = ['Mordedor', 'Ração para cães', 'Ração para ornitorrincos']

        const productsListElement = document.querySelector('#productsList');
        const itemsAddedListElement = document.querySelector('#itemsAddedList');

        function renderProductsList() {
            productsListElement.innerHTML = '';
            productsList.forEach(product => {
                const li = `
                <li class="collection-item">
                        <div class="row valign-wrapper" style="margin-bottom: 0;">

                            <div class="col s6">
                                <span><strong>${product.name}</strong></span><br>
                                <span>Quantidade: ${product.quantity}</span>
                            </div>

                            <div class="col s6 right-align">
                                <a class="waves-effect waves-light btn">
                                    Adicionar
                                    <i class="material-icons right">send</i>
                                </a>
                            </div>

                        </div>
                    </li>
            `
            productsListElement.innerHTML += li;
            })
        }

        function renderItemsAddedList() {
            itemsAddedListElement.innerHTML = '';
            itemsAdded.forEach(item => {
                const li = `
                    <li class="collection-item">
                        <div class="row valign-wrapper" style="margin-bottom: 0;">
                            <div class="col s10">
                                <span>${item}</span>
                            </div>
                            <div class="col s2 right-align">
                                <span><i class="material-icons red-text">remove_circle</i></span>
                            </div>
                        </div>
                    </li>
                `
                itemsAddedListElement.innerHTML += li;
            });
        }

        renderProductsList();
        renderItemsAddedList();
    </script>
</body>
</html>
